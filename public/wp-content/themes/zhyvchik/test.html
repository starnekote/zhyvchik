<!DOCTYPE html>
<html>

<head>

    <title>TEST</title>
</head>

<body>
    <div class="zhyvchik-my-account">
<div class="container">
    <div class="woocommerce-MyAccount-content">
        <div class="woocommerce-notices-wrapper"></div>

        <table
            class="woocommerce-orders-table woocommerce-MyAccount-orders shop_table shop_table_responsive my_account_orders account-orders-table">
            <thead>
                <tr>
                    <th scope="col"
                        class="woocommerce-orders-table__header woocommerce-orders-table__header-order-number"><span
                            class="nobr">Замовлення</span></th>
                    <th scope="col"
                        class="woocommerce-orders-table__header woocommerce-orders-table__header-order-date"><span
                            class="nobr">Дата</span></th>
                    <th scope="col"
                        class="woocommerce-orders-table__header woocommerce-orders-table__header-order-status"><span

                    <th scope="col"
                        class="woocommerce-orders-table__header woocommerce-orders-table__header-order-total"><span
                            class="nobr">Загалом</span></th>
                    <th scope="col"
                        class="woocommerce-orders-table__header woocommerce-orders-table__header-mrkv_ua_ship_ttn-column">
                        <span class="nobr">Накладна</span></th>
                    <th scope="col"
                        class="woocommerce-orders-table__header woocommerce-orders-table__header-order-actions"><span
                            class="nobr">Дії</span></th>
                </tr>
            </thead>

            <tbody>
                <tr class="woocommerce-orders-table__row woocommerce-orders-table__row--status-processing order">
                    <th class="woocommerce-orders-table__cell woocommerce-orders-table__cell-order-number"
                        data-title="Замовлення" scope="row">

                        <a href="https://zhyvchik/my-account/view-order/95/"
                            aria-label="Переглянути номер замовлення 95">
                            №95 </a>


                    </th>
                    <td class="woocommerce-orders-table__cell woocommerce-orders-table__cell-order-date"
                        data-title="Дата">

                        <time datetime="2026-05-02T13:01:48+00:00">02.05.2026</time>


                    </td>
                    <td class="woocommerce-orders-table__cell woocommerce-orders-table__cell-order-status"
                        data-title="Статус">

                        В обробці

                    </td>
                    <td class="woocommerce-orders-table__cell woocommerce-orders-table__cell-order-total"
                        data-title="Загалом">

                        <span class="woocommerce-Price-amount amount">172,00&nbsp;<span
                                class="woocommerce-Price-currencySymbol">₴</span></span> за 5 позицій

                    </td>
                    <td class="woocommerce-orders-table__cell woocommerce-orders-table__cell-mrkv_ua_ship_ttn-column"
                        data-title="Накладна">



                    </td>
                    <td class="woocommerce-orders-table__cell woocommerce-orders-table__cell-order-actions"
                        data-title="Дії">

                        <a href="https://zhyvchik/my-account/view-order/95/" class="woocommerce-button button view"
                            aria-label="Переглянути замовлення 95">Перегляд</a>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

    <script src="assets/js/main.js"></script>
