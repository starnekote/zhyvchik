<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="assets/css/swiper-bundle.min.css">
    <title>TEST</title>
</head>

<body>

    <div class="woocommerce-notices-wrapper">
        <div class="woocommerce-message" role="alert" tabindex="-1">
            “Beanie” додано до кошика. 
            <a href="https://zhyvchik/?page_id=8" class="button wc-forward">Переглянути кошик</a> 
        </div>
    </div>

    <section class="zhyvchik-add-to-cart">
        <div class="container">
            <form class="cart" action="https://zhyvchik/?product=beanie" method="post" enctype="multipart/form-data">
                <div class="quantity zhyvchik-container">
                    <button class="zhyvchik-change-price-btn" id="toggleBtn">Змінити кількість товару</button>
                    <input type="number" id="quantity_69d2a50119e8e" class="input-text qty text" name="quantity"
                        value="1" aria-label="Кількість товару" min="1" step="1" placeholder="" inputmode="numeric"
                        autocomplete="off">
                </div>
                <button type="submit" name="add-to-cart" value="35" class="single_add_to_cart_button button alt">Додати
                    в кошик</button>
            </form>
        </div>
    </section>

    <script src="assets/js/swiper-bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
